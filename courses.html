<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - SkillTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }

    header{
      background:#1f2a44;
      color:white;
      padding:15px;
      text-align:center;
    }

    nav a{
      color:white;
      margin-right:20px;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{
      text-decoration:underline;
    }

    .breadcrumb{
      background:#ecf0f1;
      padding:10px;
    }

    main{
      padding:20px;
    }

    .course-flex{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
    }

    .course-card{
      flex:1 1 300px;
      background:white;
      padding:15px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .course-card iframe{
      width:100%;
      border:0;
      border-radius:8px;
      margin-top:10px;
    }

    footer{
      background:#1f2a44;
      color:white;
      text-align:center;
      padding:10px;
      margin-top:20px;
    }

    #logoutBtn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#dc3545;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:30px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    #logoutBtn:hover{
      background:#b02a37;
    }

    @media(max-width:900px){
      .course-flex{
        flex-direction:column;
      }
    }
  </style>
</head>
<body onload="checkLogin(); renderCoursesPage();">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Courses</div>

<main>
  <section>
    <h3>Courses Table</h3>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Course</th>
          <th>Lessons</th>
          <th>Progress</th>
        </tr>
      </thead>
      <tbody id="courseTable"></tbody>
    </table>
  </section>

  <section>
    <h3 class="mt-4">Course Cards</h3>
    <div class="course-flex" id="courseContainer"></div>
  </section>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
const courses = [
  {
    name:"HTML",
    lessons:["Intro","Tags","Forms"],
    video:"https://www.youtube.com/embed/qz0aGYrrlhU"
  },
  {
    name:"CSS",
    lessons:["Selectors","Flexbox","Grid"],
    video:"https://www.youtube.com/embed/yfoY53QXEnI"
  },
  {
    name:"JavaScript",
    lessons:["Variables","Functions","DOM"],
    video:"https://www.youtube.com/embed/W6NZfCO5SIk"
  }
];

function checkLogin(){
  const name = localStorage.getItem("student");
  if(!name){
    window.location.href = "index.html";
  }
}

function getCourseProgress(courseName){
  const videoDone = localStorage.getItem(courseName + "_video") === "true";
  const quizDone = localStorage.getItem(courseName + "_quiz") === "true";

  let progress = 0;
  if(videoDone) progress += 50;
  if(quizDone) progress += 50;

  return progress;
}

function renderCoursesPage(){
  const table = document.getElementById("courseTable");
  const container = document.getElementById("courseContainer");

  table.innerHTML = "";
  container.innerHTML = "";

  courses.forEach(c => {
    const progress = getCourseProgress(c.name);
    const videoDone = localStorage.getItem(c.name + "_video") === "true";

    table.innerHTML += `
      <tr>
        <td>${c.name}</td>
        <td>${c.lessons.length}</td>
        <td>${progress}%</td>
      </tr>
    `;

    container.innerHTML += `
      <div class="course-card">
        <h4>${c.name}</h4>
        <ol>
          ${c.lessons.map(l => `<li>${l}</li>`).join("")}
        </ol>
        <iframe
          height="180"
          src="${c.video}"
          title="${c.name} video"
          allowfullscreen>
        </iframe>
        <button class="btn btn-primary mt-3" onclick="markVideoWatched('${c.name}')">
          ${videoDone ? "Video Watched ✅" : "Mark Video Watched"}
        </button>
      </div>
    `;
  });
}

function markVideoWatched(courseName){
  localStorage.setItem(courseName + "_video", "true");
  renderCoursesPage();
  alert(courseName + " video marked as watched");
}

function logout(){
  const username = localStorage.getItem("student") || "User";
  sessionStorage.setItem("logoutMessage", username + " Successfully Logout");
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SkillTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }

    header{
      background:#1f2a44;
      color:white;
      padding:15px;
      text-align:center;
    }

    nav a{
      color:white;
      margin-right:20px;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{
      text-decoration:underline;
    }

    .breadcrumb{
      background:#ecf0f1;
      padding:10px;
    }

    main{
      padding:20px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card-box{
      background:white;
      padding:20px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .small-note{
      font-size:14px;
      color:#666;
    }

    footer{
      background:#1f2a44;
      color:white;
      text-align:center;
      padding:10px;
      margin-top:20px;
    }

    #logoutBtn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#dc3545;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:30px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    #logoutBtn:hover{
      background:#b02a37;
    }

    @media(max-width:900px){
      .dashboard-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body onload="loadDashboard()">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Dashboard</div>

<main>
  <section class="mb-4">
    <div class="card-box">
      <h3>Welcome, <span id="studentName">Student</span></h3>
      <p class="small-note">This dashboard shows your current learning overview.</p>
      <p><strong>Last Quiz Score:</strong> <span id="lastScore">0</span></p>
    </div>
  </section>

  <section>
    <h3>Available Courses</h3>
    <p class="small-note">Courses are loaded from backend API.</p>
    <div class="dashboard-grid" id="dashboardGrid"></div>
  </section>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
async function loadDashboard(){
  const student = localStorage.getItem("student");
  const lastScore = localStorage.getItem("lastScore");

  document.getElementById("studentName").innerText = student || "Student";
  document.getElementById("lastScore").innerText = lastScore || "0";

  try{
    const response = await fetch("http://localhost:5000/api/Courses");
    const data = await response.json();

    const grid = document.getElementById("dashboardGrid");
    grid.innerHTML = "";

    data.forEach(course => {
      grid.innerHTML += `
        <div class="card-box">
          <h4>${course.title}</h4>
          <p>${course.description}</p>
          <a href="courses.html" class="btn btn-primary mt-2">View Courses</a>
        </div>
      `;
    });
  }
  catch(error){
    console.log("Dashboard Error:", error);
    alert("Backend not connected or server not running");
  }
}

function logout(){
  const username = localStorage.getItem("student") || "User";
  sessionStorage.setItem("logoutMessage", username + " Successfully Logout");
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>

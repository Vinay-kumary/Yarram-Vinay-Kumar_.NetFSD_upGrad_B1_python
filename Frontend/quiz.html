<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - SkillTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .quiz-box{
      max-width:700px;
      margin:40px auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    .question-box{
      margin-bottom:20px;
    }
    .loading{
      text-align:center;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>
<body onload="initializeQuizPage()">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Quiz</div>

<main>
  <section class="quiz-box">
    <h3 class="mb-4">Backend Quiz</h3>
    <div id="quizContainer"></div>
    <button type="button" class="btn btn-success mt-3" onclick="submitQuiz()">Submit Quiz</button>
    <h4 class="mt-4" id="result"></h4>
  </section>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
function initializeQuizPage() {
  const container = document.getElementById("quizContainer");

  container.innerHTML = `
    <div class="question-box">
      <p><strong>1. What does HTML stand for?</strong></p>

      <label>
        <input type="radio" name="q0" value="A">
        Hyper Text Markup Language
      </label><br>

      <label>
        <input type="radio" name="q0" value="B">
        High Text Machine Language
      </label><br>

      <label>
        <input type="radio" name="q0" value="C">
        Home Tool Markup Language
      </label><br>

      <label>
        <input type="radio" name="q0" value="D">
        Hyper Tool Multi Language
      </label><br>
    </div>
  `;
}

async function submitQuiz() {
  const selected = document.querySelector('input[name="q0"]:checked');
  const resultBox = document.getElementById("result");

  if (!selected) {
    alert("Please select an answer");
    return;
  }

  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("User not found. Please register again.");
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/Quizzes/1/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId: parseInt(userId),
        quizId: 1,
        answers: [selected.value]
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      alert(errorText);
      return;
    }

    const data = await response.json();

    resultBox.innerHTML = "Score: " + data.score;

    localStorage.setItem("lastScore", data.score);
  }
  catch (error) {
    console.log("Quiz Submit Error:", error);
    alert("Backend not connected or server not running");
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - SkillTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }
    header{
      background:#1f2a44;
      color:white;
      padding:15px;
      text-align:center;
    }
    nav a{
      color:white;
      margin-right:20px;
      text-decoration:none;
      font-weight:bold;
    }
    nav a:hover{
      text-decoration:underline;
    }
    .breadcrumb{
      background:#ecf0f1;
      padding:10px;
    }
    main{
      padding:20px;
    }
    .course-flex{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
    }
    .course-card{
      flex:1 1 300px;
      background:white;
      padding:15px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }
    footer{
      background:#1f2a44;
      color:white;
      text-align:center;
      padding:10px;
      margin-top:20px;
    }
    #logoutBtn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#dc3545;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:30px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }
    #logoutBtn:hover{
      background:#b02a37;
    }
    @media(max-width:900px){
      .course-flex{
        flex-direction:column;
      }
    }
  </style>
</head>
<body onload="loadCourses()">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Courses</div>

<main>
  <section>
    <h3>Courses Table</h3>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Course ID</th>
          <th>Title</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="courseTable"></tbody>
    </table>
  </section>

  <section>
    <h3 class="mt-4">Course Cards</h3>
    <div class="course-flex" id="courseContainer"></div>
  </section>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
async function loadCourses(){
  try{
    const response = await fetch("http://localhost:5000/api/Courses");
    const data = await response.json();

    const table = document.getElementById("courseTable");
    const container = document.getElementById("courseContainer");

    table.innerHTML = "";
    container.innerHTML = "";

    data.forEach(course => {
      table.innerHTML += `
        <tr>
          <td>${course.courseId}</td>
          <td>${course.title}</td>
          <td>${course.description}</td>
        </tr>
      `;

      container.innerHTML += `
        <div class="course-card">
          <h4>${course.title}</h4>
          <p>${course.description}</p>
          <button class="btn btn-primary mt-2" onclick="openQuiz(${course.courseId})">
            Open Quiz
          </button>
        </div>
      `;
    });
  }
  catch(error){
    console.log("Error loading courses:", error);
    alert("Backend not connected or server not running");
  }
}

function openQuiz(courseId){
  localStorage.setItem("selectedCourseId", courseId);
  window.location.href = "quiz.html";
}

function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>

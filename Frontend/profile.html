<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SkillTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }
    header{
      background:#1f2a44;
      color:white;
      padding:15px;
      text-align:center;
    }
    nav a{
      color:white;
      margin-right:20px;
      text-decoration:none;
      font-weight:bold;
    }
    nav a:hover{
      text-decoration:underline;
    }
    .breadcrumb{
      background:#ecf0f1;
      padding:10px;
    }
    main{
      padding:20px;
    }
    .profile-box,
    .graph-box{
      background:white;
      padding:20px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
      height:100%;
    }
    .graph-box h4{
      margin-bottom:20px;
    }
    footer{
      background:#1f2a44;
      color:white;
      text-align:center;
      padding:10px;
      margin-top:20px;
    }
    #logoutBtn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#dc3545;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:30px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }
    #logoutBtn:hover{
      background:#b02a37;
    }
  </style>
</head>
<body onload="loadProfile()">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Profile</div>

<main class="container-fluid">
  <div class="row g-4">
    <div class="col-lg-6">
      <section class="profile-box">
        <h3>Student Profile</h3>
        <p><strong>Name:</strong> <span id="studentName"></span></p>
        <p><strong>Email:</strong> <span id="studentEmail"></span></p>
        <p><strong>College:</strong> Saveetha University</p>
        <p><strong>Quiz ID:</strong> <span id="quizTitle"></span></p>
        <p><strong>Score:</strong> <span id="score"></span></p>
        <p><strong>Attempt Date:</strong> <span id="attemptDate"></span></p>
      </section>
    </div>

    <div class="col-lg-6">
      <section class="graph-box">
        <h4>Quiz Score Graph</h4>
        <canvas id="progressChart"></canvas>
      </section>
    </div>
  </div>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
let chartInstance = null;

async function loadProfile() {
  const userId = localStorage.getItem("userId");
  const studentName = localStorage.getItem("student");
  const studentEmail = localStorage.getItem("email");

  if (!userId) {
    alert("User not found. Please register again.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("studentName").innerText = studentName || "No Name";
  document.getElementById("studentEmail").innerText = studentEmail || "No Email";

  try {
    const response = await fetch(`http://localhost:5000/api/Results/${userId}`);
    const data = await response.json();

    if (!response.ok) {
      alert("Failed to load profile");
      return;
    }

    if (data.length > 0) {
      const result = data[0];

      document.getElementById("quizTitle").innerText = result.quizId ?? "No Quiz";
      document.getElementById("score").innerText = result.score ?? 0;
      document.getElementById("attemptDate").innerText = result.attemptDate ?? "-";

      renderChart(result.score ?? 0);
    } else {
      document.getElementById("quizTitle").innerText = "No Quiz Attempted";
      document.getElementById("score").innerText = "0";
      document.getElementById("attemptDate").innerText = "-";

      renderChart(0);
    }
  }
  catch (error) {
    console.log("Profile Error:", error);
    alert("Backend not connected or server not running");
  }
}

function renderChart(score) {
  const ctx = document.getElementById("progressChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Quiz Score"],
      datasets: [{
        label: "Score",
        data: [score],
        backgroundColor: ["rgba(54, 162, 235, 0.7)"],
        borderColor: ["rgba(54, 162, 235, 1)"],
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: true,
          max: 10
        }
      }
    }
  });
}

function logout() {
  const username = localStorage.getItem("student") || "User";
  sessionStorage.setItem("logoutMessage", username + " Successfully Logout");
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - SkillTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.quiz-box{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.question-box{
    margin-bottom:20px;
}

.loading{
    text-align:center;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body onload="checkLogin(); initializeQuizPage();">

<header>
  <h2>🎓 SkillTrack E-Learning Platform</h2>
</header>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">SkillTrack📚</a>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="quiz.html">Quiz</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">Home > Quiz</div>

<main>
  <section class="quiz-box">
    <h3 class="mb-4">Frontend Quiz</h3>

    <div id="quizContainer"></div>

    <button type="button" class="btn btn-success mt-3" onclick="submitQuiz()">Submit Quiz</button>

    <h4 class="mt-4" id="result"></h4>
  </section>
</main>

<footer>
  SkillTrack Learning System
</footer>

<button onclick="logout()" id="logoutBtn">🚪 Logout</button>

<script>
async function initializeQuizPage() {
  const container = document.getElementById("quizContainer");
  container.innerHTML = '<div class="loading">Loading quiz...</div>';

  const data = await loadQuizData();
  renderQuiz(data);
}

function renderQuiz(data) {
  const container = document.getElementById("quizContainer");
  container.innerHTML = "";

  data.forEach((q, index) => {
    container.innerHTML += `
      <div class="question-box question mb-3">
        <p><strong>${index + 1}. ${q.question}</strong></p>
        ${q.options.map(option => `
          <label>
            <input
              type="radio"
              name="q${index}"
              value="${option}"
              onchange="handleOptionChange()">
            ${option}
          </label><br>
        `).join("")}
      </div>
    `;
  });
}

function submitQuiz() {
  let correct = 0;
  let total = quizQuestions.length;

  quizQuestions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (selected && selected.value === q.answer) {
      correct++;
    }
  });

  const percentage = calculatePercentage(correct, total);
  const grade = calculateGrade(percentage);
  const feedback = getFeedback(grade);
  const passed = isPassed(percentage);

  localStorage.setItem("score", percentage);
  localStorage.setItem("grade", grade);
  localStorage.setItem("feedback", feedback);

  localStorage.setItem("HTML_quiz", passed ? "true" : "false");
  localStorage.setItem("CSS_quiz", passed ? "true" : "false");
  localStorage.setItem("JavaScript_quiz", passed ? "true" : "false");

  document.getElementById("result").innerHTML =
    "Score: " + percentage + "% | Grade: " + grade + " | " + feedback;
}
</script>

<script src="script.js"></script>

</body>
</html>
